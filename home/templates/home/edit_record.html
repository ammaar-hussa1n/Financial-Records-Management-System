{% extends "home/base.html" %}

{% block title %}Edit Record {{ record.id }}{% endblock %}

{% block content %}
<div class="container mt-5 mb-4" style="max-width: 850px;">
	<div class="card shadow-lg border-0">
		<div class="card-header bg-primary text-white">
			<h4 class="mb-0">Edit Record</h4>
		</div>
		<div class="card-body">
			<p class="text-muted mb-4">
				Uploaded by : <strong>{{ record.user.username|default:"Unknown" }}</strong>
			</p>

			<form method="post" action="{% url 'edit_record' record.id %}">
				{% csrf_token %}

				<div class="row g-3">
					<div class="col-md-6">
						<label for="amount" class="form-label">Amount*</label>
						<input type="number" min="1" class="form-control" id="amount" name="amount" value="{{ record.amount }}" required>
					</div>

					<div class="col-md-6">
						<label for="type" class="form-label">Type*</label>
						<select id="type" name="type" class="form-select" required>
							<option value="Income" {% if record.type == 'Income' %}selected{% endif %}>Income</option>
							<option value="Expense" {% if record.type == 'Expense' %}selected{% endif %}>Expense</option>
						</select>
					</div>

					<div class="col-12">
						<label for="category" class="form-label">Category*</label>
						<select id="category" name="category" class="form-select" required>
							<option value="Salary" {% if record.category == 'Salary' %}selected{% endif %}>Salary</option>
							<option value="Friend" {% if record.category == 'Friend' %}selected{% endif %}>Friend</option>
							<option value="Business" {% if record.category == 'Business' %}selected{% endif %}>Business</option>
							<option value="Food" {% if record.category == 'Food' %}selected{% endif %}>Food</option>
							<option value="Transportation" {% if record.category == 'Transportation' %}selected{% endif %}>Transportation</option>
							<option value="Entertainment" {% if record.category == 'Entertainment' %}selected{% endif %}>Entertainment</option>
							<option value="Groceries" {% if record.category == 'Groceries' %}selected{% endif %}>Groceries</option>
							<option value="Healthcare" {% if record.category == 'Healthcare' %}selected{% endif %}>Healthcare</option>
							<option value="Other" {% if record.category == 'Other' %}selected{% endif %}>Other</option>
						</select>
					</div>

					<div class="col-12">
						<label for="description" class="form-label">Description</label>
						<textarea id="description" name="description" class="form-control" rows="5">{{ record.description|default:"" }}</textarea>
					</div>
				</div>

				<div class="d-flex flex-wrap gap-2 mt-4">
					<button type="submit" name="action" value="update" class="btn btn-primary">Save Changes</button>
					<a href="{% url 'view_record' record.id %}" class="btn btn-outline-secondary">Cancel</a>
					<button
						type="submit"
						name="action"
						value="delete"
						class="btn btn-danger ms-md-auto"
						onclick="return confirm('Delete this record? This cannot be undone.');"
					>
						Delete Record
					</button>
				</div>
			</form>
		</div>
	</div>
</div>
{% endblock %}
